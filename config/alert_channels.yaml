# Argus alert channel configuration
# ────────────────────────────────────────────────────────────────────────────
# Copy this file and fill in real values. Do NOT commit credentials to git.
# An empty or absent channels list means no alerts are sent (graceful no-op).
#
# Supported channel kinds: webhook, email

channels: []

