node_types:
  - Goal           # Product goal (G1–G7)
  - FR             # Functional requirement
  - NFR            # Non-functional requirement
  - ADR            # Architectural decision record
  - Domain         # Observation domain (D1–D4)
  - Predictor      # Tier A predictor
  - AIFeature      # Tier B AI capability
  - Feature        # Roadmap feature (F-000–F-056)
  - Phase          # Development phase (PH-0–PH-11)
  - Module         # Python module
  - DataModel      # Entity in DATA_MODELS.md
  - API            # API endpoint
  - Standard       # TESTING.md, CODING.md, QUOTAS.md
  - Milestone      # MVP etc.
  - OpenQuestion   # OQ-A through OQ-F

edge_types:
  - implements     # A implements B (feature→requirement)
  - depends_on     # A cannot start until B is DONE
  - defines        # ADR defines a decision
  - extends        # A adds capability to B
  - references     # A references B for context
  - tests          # A validates B
  - owns           # Module owns a data model or file
  - produces       # A produces B as output
  - consumes       # A takes B as input
  - validates      # A validates B against criteria
  - supersedes     # A replaces B
  - resolves       # A resolves open question B
  - blocks         # A blocks B until A is resolved

